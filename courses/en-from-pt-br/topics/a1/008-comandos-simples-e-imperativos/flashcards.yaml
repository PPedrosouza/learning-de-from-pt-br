topic: "Comandos simples e imperativos"
level: "A1"
cards:
  - front: "Open the file."
    back: "Abra o arquivo."
    example: "Open the file and check the name."
    example_translation: "Abra o arquivo e verifique o nome."
  - front: "Close the window."
    back: "Feche a janela."
    example: "Close the window after the meeting."
    example_translation: "Feche a janela depois da reunião."
  - front: "Click the button."
    back: "Clique no botão."
    example: "Click the button to start."
    example_translation: "Clique no botão para começar."
  - front: "Type your email."
    back: "Digite seu e-mail."
    example: "Type your email in the field."
    example_translation: "Digite seu e-mail no campo."
  - front: "Run the test."
    back: "Execute o teste."
    example: "Run the test before lunch."
    example_translation: "Execute o teste antes do almoço."
  - front: "Save the document."
    back: "Salve o documento."
    example: "Save the document now."
    example_translation: "Salve o documento agora."
  - front: "Send the message."
    back: "Envie a mensagem."
    example: "Send the message to Ana."
    example_translation: "Envie a mensagem para a Ana."
  - front: "Check the report."
    back: "Verifique o relatório."
    example: "Check the report today."
    example_translation: "Verifique o relatório hoje."
  - front: "Create a folder."
    back: "Crie uma pasta."
    example: "Create a folder for the project."
    example_translation: "Crie uma pasta para o projeto."
  - front: "Do not delete the file."
    back: "Não delete o arquivo."
    example: "Do not delete the file from the server."
    example_translation: "Não delete o arquivo do servidor."
  - front: "Please save the file."
    back: "Por favor, salve o arquivo."
    example: "Please save the file before you close it."
    example_translation: "Por favor, salve o arquivo antes de fechá-lo."
  - front: "Click the link, please."
    back: "Clique no link, por favor."
    example: "Click the link, please, and open the page."
    example_translation: "Clique no link, por favor, e abra a página."
