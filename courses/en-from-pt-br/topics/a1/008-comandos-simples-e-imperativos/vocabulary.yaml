topic: "Comandos simples e imperativos"
level: "A1"
words:
  - english: "open"
    translation: "abrir"
    example: "Open the file."
    example_translation: "Abra o arquivo."
    note: "Use no começo da frase para dar uma instrução direta."
  - english: "close"
    translation: "fechar"
    example: "Close the window."
    example_translation: "Feche a janela."
  - english: "click"
    translation: "clicar"
    example: "Click the button."
    example_translation: "Clique no botão."
    note: "Em inglês, normalmente se diz `click the button`, sem preposição entre `click` e o objeto."
  - english: "type"
    translation: "digitar"
    example: "Type your password."
    example_translation: "Digite sua senha."
  - english: "run"
    translation: "executar, rodar"
    example: "Run the test."
    example_translation: "Execute o teste."
    note: "Muito comum para testes, aplicativos e scripts."
  - english: "save"
    translation: "salvar"
    example: "Save the document."
    example_translation: "Salve o documento."
  - english: "send"
    translation: "enviar"
    example: "Send the message."
    example_translation: "Envie a mensagem."
  - english: "check"
    translation: "verificar, conferir"
    example: "Check the report."
    example_translation: "Verifique o relatório."
  - english: "create"
    translation: "criar"
    example: "Create a new folder."
    example_translation: "Crie uma nova pasta."
  - english: "delete"
    translation: "deletar, apagar"
    example: "Delete the old file."
    example_translation: "Delete o arquivo antigo."
  - english: "please"
    translation: "por favor"
    example: "Please save the file."
    example_translation: "Por favor, salve o arquivo."
    note: "Pode aparecer no começo ou no fim do pedido."
  - english: "do not"
    translation: "não, não faça"
    example: "Do not close the app."
    example_translation: "Não feche o aplicativo."
    note: "Forma clara e formal para comandos negativos."
  - english: "button"
    translation: "botão"
    example: "Click the green button."
    example_translation: "Clique no botão verde."
  - english: "file"
    translation: "arquivo"
    example: "Open the file, please."
    example_translation: "Abra o arquivo, por favor."
  - english: "folder"
    translation: "pasta"
    example: "Create a folder."
    example_translation: "Crie uma pasta."
  - english: "link"
    translation: "link"
    example: "Click the link."
    example_translation: "Clique no link."
  - english: "window"
    translation: "janela"
    example: "Close the window."
    example_translation: "Feche a janela."
  - english: "app"
    translation: "aplicativo"
    example: "Run the app."
    example_translation: "Execute o aplicativo."
