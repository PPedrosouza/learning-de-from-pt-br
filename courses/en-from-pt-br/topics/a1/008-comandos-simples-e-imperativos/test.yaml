topic: "Comandos simples e imperativos"
level: "A1"
questions:
  - type: "multiple_choice"
    question: "Qual opção significa 'Execute o aplicativo'?"
    options:
      - "Save the app."
      - "Run the app."
      - "Close the app."
    answer: "Run the app."
  - type: "multiple_choice"
    question: "Escolha a instrução educada para pedir que alguém envie o arquivo."
    options:
      - "Delete the file."
      - "The file send please."
      - "Please send the file."
    answer: "Please send the file."
  - type: "multiple_choice"
    question: "Qual comando negativo está correto?"
    options:
      - "Do not click the red button."
      - "Not click the red button."
      - "No click the red button."
    answer: "Do not click the red button."
  - type: "fill_in_the_blank"
    question: "_____ a new project folder."
    answer: "Create"
  - type: "fill_in_the_blank"
    question: "Please _____ the page after login."
    answer: "check"
  - type: "translation"
    question: "Traduza: 'Feche a janela, por favor.'"
    answer: "Close the window, please."
  - type: "translation"
    question: "Traduza: 'Digite seu nome.'"
    answer: "Type your name."
  - type: "transformation"
    question: "Transforme em comando educado: 'Open the dashboard.'"
    answer: "Please open the dashboard."
  - type: "short_production"
    question: "Escreva um comando em inglês pedindo para verificar um e-mail."
    answer: "Please check the email."
  - type: "short_production"
    question: "Escreva um comando em inglês dizendo para não salvar a alteração."
    answer: "Do not save the change."
