topic: "Comandos simples e imperativos"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Reconheça o comando"
    instructions: "Escolha a melhor tradução em português."
    items:
      - id: "1.1"
        question: "Open the folder."
        options:
          - "Abra a pasta."
          - "Feche a pasta."
          - "Delete a pasta."
        answer: "Abra a pasta."
      - id: "1.2"
        question: "Click the link."
        options:
          - "Digite o link."
          - "Clique no link."
          - "Envie o link."
        answer: "Clique no link."
      - id: "1.3"
        question: "Save the document."
        options:
          - "Abra o documento."
          - "Verifique o documento."
          - "Salve o documento."
        answer: "Salve o documento."
      - id: "1.4"
        question: "Do not close the app."
        options:
          - "Não feche o aplicativo."
          - "Não abra o aplicativo."
          - "Não execute o aplicativo."
        answer: "Não feche o aplicativo."
  - type: "fill_in_the_blank"
    title: "Complete o comando"
    instructions: "Complete com o verbo em inglês mais adequado."
    items:
      - id: "2.1"
        question: "_____ the message to the team."
        answer: "Send"
      - id: "2.2"
        question: "_____ your password in the field."
        answer: "Type"
      - id: "2.3"
        question: "_____ the test before the demo."
        answer: "Run"
      - id: "2.4"
        question: "Please _____ the report today."
        answer: "check"
  - type: "translation"
    title: "Traduza para o inglês"
    instructions: "Escreva uma instrução curta em inglês."
    items:
      - id: "3.1"
        question: "Abra o arquivo."
        answer: "Open the file."
      - id: "3.2"
        question: "Por favor, clique no botão."
        answer: "Please click the button."
      - id: "3.3"
        question: "Crie uma nova pasta."
        answer: "Create a new folder."
      - id: "3.4"
        question: "Não delete o documento."
        answer: "Do not delete the document."
  - type: "transformation"
    title: "Deixe mais educado"
    instructions: "Reescreva o comando usando `please`."
    items:
      - id: "4.1"
        question: "Save the file."
        answer: "Please save the file."
      - id: "4.2"
        question: "Send the report."
        answer: "Please send the report."
      - id: "4.3"
        question: "Check the link."
        answer: "Please check the link."
  - type: "short_production"
    title: "Produção curta"
    instructions: "Escreva um comando simples em inglês para cada situação."
    items:
      - id: "5.1"
        question: "Você quer que um colega feche uma aba do navegador."
        answer: "Close the tab, please."
      - id: "5.2"
        question: "Você quer pedir que alguém salve um arquivo agora."
        answer: "Please save the file now."
      - id: "5.3"
        question: "Você quer avisar para não deletar uma pasta antiga."
        answer: "Do not delete the old folder."
