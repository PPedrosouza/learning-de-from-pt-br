topic: "Presente simples: rotina de trabalho"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Reconhecimento de rotina"
    instruction: "Escolha a melhor opção em inglês."
    items:
      - id: "1.1"
        question: "Como dizer 'Eu escrevo código' em inglês?"
        options:
          - "I write code."
          - "I writes code."
          - "I am write code."
        answer: "I write code."
      - id: "1.2"
        question: "Qual frase negativa está correta?"
        options:
          - "I no use Windows."
          - "I don't use Windows."
          - "I doesn't use Windows."
        answer: "I don't use Windows."
      - id: "1.3"
        question: "Qual pergunta está correta para 'Você testa o app?'"
        options:
          - "You test the app?"
          - "Does you test the app?"
          - "Do you test the app?"
        answer: "Do you test the app?"
      - id: "1.4"
        question: "Escolha a frase correta com 'she'."
        options:
          - "She works from home."
          - "She work from home."
          - "She do work from home."
        answer: "She works from home."
      - id: "1.5"
        question: "Qual pergunta está correta com 'he'?"
        options:
          - "Do he deploy the app?"
          - "Does he deploy the app?"
          - "Does he deploys the app?"
        answer: "Does he deploy the app?"
      - id: "1.6"
        question: "Escolha a resposta curta correta para 'Do you use Git?'"
        options:
          - "Yes, I does."
          - "Yes, I am."
          - "Yes, I do."
        answer: "Yes, I do."
  - type: "fill_in_the_blank"
    title: "Complete com do, does, don't ou doesn't"
    instruction: "Complete cada frase com o auxiliar correto."
    items:
      - id: "2.1"
        question: "I ___ use Windows at work."
        answer: "don't"
      - id: "2.2"
        question: "___ you write code every day?"
        answer: "Do"
      - id: "2.3"
        question: "She ___ test in production."
        answer: "doesn't"
      - id: "2.4"
        question: "___ he check the tickets in the morning?"
        answer: "Does"
      - id: "2.5"
        question: "We ___ deploy on Friday."
        answer: "don't"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza as frases usando presente simples."
    items:
      - id: "3.1"
        question: "Eu trabalho com software."
        answer: "I work with software."
      - id: "3.2"
        question: "Nós testamos o aplicativo depois do almoço."
        answer: "We test the app after lunch."
      - id: "3.3"
        question: "Eu não faço deploy na sexta-feira."
        answer: "I don't deploy on Friday."
      - id: "3.4"
        question: "Você usa Linux?"
        answer: "Do you use Linux?"
      - id: "3.5"
        question: "Ela escreve código de manhã."
        answer: "She writes code in the morning."
  - type: "transformation"
    title: "Transformação de frases"
    instruction: "Transforme a frase conforme indicado."
    items:
      - id: "4.1"
        question: "I use Windows. Passe para a negativa."
        answer: "I don't use Windows."
      - id: "4.2"
        question: "You test the app. Passe para pergunta."
        answer: "Do you test the app?"
      - id: "4.3"
        question: "She deploys the app. Passe para pergunta."
        answer: "Does she deploy the app?"
      - id: "4.4"
        question: "He writes code. Passe para a negativa."
        answer: "He doesn't write code."
      - id: "4.5"
        question: "We check tickets. Acrescente 'every day'."
        answer: "We check tickets every day."
  - type: "short_production"
    title: "Produção curta"
    instruction: "Escreva respostas simples em inglês. Outras respostas corretas são possíveis."
    items:
      - id: "5.1"
        question: "Escreva uma frase afirmativa sobre sua rotina com 'work'."
        answer: "I work from home."
      - id: "5.2"
        question: "Escreva uma frase negativa sobre uma ferramenta ou sistema que você não usa."
        answer: "I don't use Windows."
      - id: "5.3"
        question: "Escreva uma pergunta para um colega usando 'Do you...?'."
        answer: "Do you use Git?"
