topic: "Presente simples: rotina de trabalho"
level: "A1"
cards:
  - front: "I work from home."
    back: "Eu trabalho de casa."
    example: "I work from home on Friday."
    example_translation: "Eu trabalho de casa na sexta-feira."
  - front: "I write code."
    back: "Eu escrevo código."
    example: "I write code in the morning."
    example_translation: "Eu escrevo código de manhã."
  - front: "I test the app."
    back: "Eu testo o aplicativo."
    example: "I test the app after lunch."
    example_translation: "Eu testo o aplicativo depois do almoço."
  - front: "I deploy the app."
    back: "Eu faço deploy do aplicativo."
    example: "I deploy the app at five."
    example_translation: "Eu faço deploy do aplicativo às cinco."
  - front: "I don't use Windows."
    back: "Eu não uso Windows."
    example: "I don't use Windows at work."
    example_translation: "Eu não uso Windows no trabalho."
  - front: "Do you use Git?"
    back: "Você usa Git?"
    example: "Do you use Git every day?"
    example_translation: "Você usa Git todos os dias?"
  - front: "Does she write code?"
    back: "Ela escreve código?"
    example: "Does she write code in the morning?"
    example_translation: "Ela escreve código de manhã?"
  - front: "She works from home."
    back: "Ela trabalha de casa."
    example: "She works from home on Monday."
    example_translation: "Ela trabalha de casa na segunda-feira."
  - front: "He doesn't deploy on Friday."
    back: "Ele não faz deploy na sexta-feira."
    example: "He doesn't deploy on Friday afternoon."
    example_translation: "Ele não faz deploy na sexta-feira à tarde."
  - front: "We have a meeting at ten."
    back: "Nós temos uma reunião às dez."
    example: "We have a meeting at ten every day."
    example_translation: "Nós temos uma reunião às dez todos os dias."
