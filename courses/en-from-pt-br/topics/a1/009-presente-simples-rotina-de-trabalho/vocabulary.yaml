topic: "Presente simples: rotina de trabalho"
level: "A1"
words:
  - english: "work"
    translation: "trabalhar"
    example: "I work from home."
    example_translation: "Eu trabalho de casa."
    note: "Use para falar de trabalho ou funcionamento: 'It works'."
  - english: "write code"
    translation: "escrever código"
    example: "I write code every morning."
    example_translation: "Eu escrevo código todas as manhãs."
  - english: "test"
    translation: "testar"
    example: "I test the app after lunch."
    example_translation: "Eu testo o aplicativo depois do almoço."
  - english: "deploy"
    translation: "fazer deploy; publicar"
    example: "We deploy the app on Monday."
    example_translation: "Nós fazemos deploy do aplicativo na segunda-feira."
  - english: "use"
    translation: "usar"
    example: "I don't use Windows at work."
    example_translation: "Eu não uso Windows no trabalho."
  - english: "check"
    translation: "verificar; checar"
    example: "She checks the report every day."
    example_translation: "Ela verifica o relatório todos os dias."
    note: "Com 'she', 'check' vira 'checks' na afirmativa."
  - english: "fix"
    translation: "corrigir; consertar"
    example: "I fix bugs in the afternoon."
    example_translation: "Eu corrijo bugs à tarde."
  - english: "bug"
    translation: "erro; bug"
    example: "The bug is small."
    example_translation: "O bug é pequeno."
  - english: "meeting"
    translation: "reunião"
    example: "We have a meeting at ten."
    example_translation: "Nós temos uma reunião às dez."
  - english: "daily"
    translation: "reunião diária; diário"
    example: "I join the daily at nine."
    example_translation: "Eu entro na reunião diária às nove."
    note: "Em equipes de software, 'daily' pode significar a reunião diária."
  - english: "task"
    translation: "tarefa"
    example: "I start a new task today."
    example_translation: "Eu começo uma nova tarefa hoje."
  - english: "ticket"
    translation: "chamado; ticket; tarefa registrada"
    example: "She closes a ticket every day."
    example_translation: "Ela fecha um ticket todos os dias."
  - english: "repository"
    translation: "repositório"
    example: "They use a private repository."
    example_translation: "Eles usam um repositório privado."
  - english: "branch"
    translation: "branch; ramificação"
    example: "I create a branch for the fix."
    example_translation: "Eu crio uma branch para a correção."
  - english: "every day"
    translation: "todos os dias"
    example: "I read tickets every day."
    example_translation: "Eu leio tickets todos os dias."
  - english: "in the morning"
    translation: "de manhã"
    example: "I write code in the morning."
    example_translation: "Eu escrevo código de manhã."
  - english: "after lunch"
    translation: "depois do almoço"
    example: "We test after lunch."
    example_translation: "Nós testamos depois do almoço."
  - english: "from home"
    translation: "de casa"
    example: "He works from home on Friday."
    example_translation: "Ele trabalha de casa na sexta-feira."
  - english: "do"
    translation: "auxiliar para perguntas e negativas"
    example: "Do you use Git?"
    example_translation: "Você usa Git?"
    note: "Use com I, you, we e they em perguntas."
  - english: "does"
    translation: "auxiliar para he, she e it"
    example: "Does she write code?"
    example_translation: "Ela escreve código?"
    note: "Depois de 'does', o verbo principal fica na forma básica."
