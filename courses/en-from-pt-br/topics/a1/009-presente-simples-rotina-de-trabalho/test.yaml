topic: "Presente simples: rotina de trabalho"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Escolha a frase correta para 'Eu corrijo bugs todos os dias'."
    options:
      - "I fix bugs every day."
      - "I fixes bugs every day."
      - "I am fix bugs every day."
    answer: "I fix bugs every day."
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase está correta com 'it'?"
    options:
      - "It run on Linux."
      - "It runs on Linux."
      - "It do run on Linux."
    answer: "It runs on Linux."
  - id: "3"
    type: "multiple_choice"
    question: "Como perguntar 'Ela participa da daily?'"
    options:
      - "Do she join the daily?"
      - "Does she joins the daily?"
      - "Does she join the daily?"
    answer: "Does she join the daily?"
  - id: "4"
    type: "multiple_choice"
    question: "Escolha a negativa correta."
    options:
      - "They don't use that repository."
      - "They doesn't use that repository."
      - "They no use that repository."
    answer: "They don't use that repository."
  - id: "5"
    type: "multiple_choice"
    question: "Qual resposta curta combina com 'Does he work from home?'"
    options:
      - "Yes, he do."
      - "Yes, he does."
      - "Yes, he is."
    answer: "Yes, he does."
  - id: "6"
    type: "multiple_choice"
    question: "Escolha a pergunta correta para 'Vocês fazem deploy hoje?'"
    options:
      - "Does you deploy today?"
      - "You deploy today?"
      - "Do you deploy today?"
    answer: "Do you deploy today?"
  - id: "7"
    type: "fill_in_the_blank"
    question: "Complete: My team ___ code in the morning."
    answer: "writes"
  - id: "8"
    type: "fill_in_the_blank"
    question: "Complete: ___ your manager check the dashboard?"
    answer: "Does"
  - id: "9"
    type: "translation"
    question: "Traduza: Eu não testo em produção."
    answer: "I don't test in production."
  - id: "10"
    type: "translation"
    question: "Traduza: Nós lemos tickets de manhã."
    answer: "We read tickets in the morning."
  - id: "11"
    type: "transformation"
    question: "Transforme em pergunta: She checks the dashboard every day."
    answer: "Does she check the dashboard every day?"
  - id: "12"
    type: "short_answer"
    question: "Responda em inglês, de forma curta: Do you work with software?"
    answer: "Yes, I do."
