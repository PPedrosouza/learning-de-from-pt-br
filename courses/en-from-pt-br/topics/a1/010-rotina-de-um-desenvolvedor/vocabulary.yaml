topic: "Rotina de um desenvolvedor"
level: "A1"
words:
  - english: "daily stand-up"
    translation: "reunião diária curta"
    example: "We have a daily stand-up at nine."
    example_translation: "Nós temos uma reunião diária curta às nove."
    note: "Muito usado em equipes de tecnologia para alinhamento rápido."
  - english: "code review"
    translation: "revisão de código"
    example: "I have a code review after lunch."
    example_translation: "Eu tenho uma revisão de código depois do almoço."
  - english: "lunch break"
    translation: "pausa para almoço"
    example: "My lunch break is at noon."
    example_translation: "Minha pausa para almoço é ao meio-dia."
  - english: "focus time"
    translation: "tempo de foco"
    example: "I need focus time in the afternoon."
    example_translation: "Eu preciso de tempo de foco à tarde."
  - english: "task"
    translation: "tarefa"
    example: "I check my tasks every morning."
    example_translation: "Eu verifico minhas tarefas todas as manhãs."
  - english: "bug"
    translation: "erro de software"
    example: "She fixes a bug before the meeting."
    example_translation: "Ela corrige um erro de software antes da reunião."
  - english: "always"
    translation: "sempre"
    example: "I always check my email in the morning."
    example_translation: "Eu sempre verifico meu e-mail de manhã."
  - english: "usually"
    translation: "geralmente"
    example: "He usually starts work at nine."
    example_translation: "Ele geralmente começa o trabalho às nove."
  - english: "often"
    translation: "frequentemente"
    example: "We often review code on Tuesday."
    example_translation: "Nós frequentemente revisamos código na terça-feira."
  - english: "sometimes"
    translation: "às vezes"
    example: "They sometimes have lunch together."
    example_translation: "Eles às vezes almoçam juntos."
  - english: "never"
    translation: "nunca"
    example: "I never skip the daily stand-up."
    example_translation: "Eu nunca pulo a reunião diária curta."
  - english: "week"
    translation: "semana"
    example: "This week is busy."
    example_translation: "Esta semana está ocupada."
  - english: "morning"
    translation: "manhã"
    example: "The team meets in the morning."
    example_translation: "A equipe se reúne de manhã."
  - english: "afternoon"
    translation: "tarde"
    example: "I write code in the afternoon."
    example_translation: "Eu escrevo código à tarde."
  - english: "to join"
    translation: "participar; entrar em uma reunião"
    example: "I join the meeting at ten."
    example_translation: "Eu participo da reunião às dez."
    note: "Em contexto profissional, pode significar entrar em uma chamada ou reunião."
  - english: "to plan"
    translation: "planejar"
    example: "We plan the next week on Friday."
    example_translation: "Nós planejamos a próxima semana na sexta-feira."
