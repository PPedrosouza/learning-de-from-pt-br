topic: "Rotina de um desenvolvedor"
level: "A1"
cards:
  - front: "daily stand-up"
    back: "reunião diária curta"
    example: "We have a daily stand-up every morning."
    example_translation: "Nós temos uma reunião diária curta todas as manhãs."
  - front: "code review"
    back: "revisão de código"
    example: "The code review is at three."
    example_translation: "A revisão de código é às três."
  - front: "lunch break"
    back: "pausa para almoço"
    example: "My lunch break is short today."
    example_translation: "Minha pausa para almoço é curta hoje."
  - front: "focus time"
    back: "tempo de foco"
    example: "I have focus time after lunch."
    example_translation: "Eu tenho tempo de foco depois do almoço."
  - front: "always"
    back: "sempre"
    example: "I always check my tasks."
    example_translation: "Eu sempre verifico minhas tarefas."
  - front: "usually"
    back: "geralmente"
    example: "She usually writes code in the morning."
    example_translation: "Ela geralmente escreve código de manhã."
  - front: "often"
    back: "frequentemente"
    example: "We often fix bugs on Monday."
    example_translation: "Nós frequentemente corrigimos bugs na segunda-feira."
  - front: "sometimes"
    back: "às vezes"
    example: "I sometimes work from home."
    example_translation: "Eu às vezes trabalho de casa."
  - front: "never"
    back: "nunca"
    example: "He never skips lunch."
    example_translation: "Ele nunca pula o almoço."
  - front: "to join"
    back: "participar; entrar em uma reunião"
    example: "I join the call at nine."
    example_translation: "Eu entro na chamada às nove."
