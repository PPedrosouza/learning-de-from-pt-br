topic: "Rotina de um desenvolvedor"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase significa 'Eu sempre escrevo código de manhã'?"
    options:
      - "I always write code in the morning."
      - "I never write code in the morning."
      - "I sometimes eat lunch in the morning."
    answer: "I always write code in the morning."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa corretamente: She ___ the daily stand-up at ten."
    options:
      - "join"
      - "joins"
      - "joining"
    answer: "joins"
  - id: "3"
    type: "multiple_choice"
    question: "Qual expressão significa 'tempo de foco'?"
    options:
      - "code review"
      - "daily stand-up"
      - "focus time"
    answer: "focus time"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete com o advérbio correto para 'às vezes': I ___ work from home on Friday."
    answer: "sometimes"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Eles frequentemente têm uma revisão de código."
    answer: "They often have a code review."
  - id: "6"
    type: "sentence_transformation"
    question: "Reescreva usando 'never': I skip my lunch break."
    answer: "I never skip my lunch break."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: usually / We / plan / on Friday / the week"
    answer: "We usually plan the week on Friday."
  - id: "8"
    type: "short_production"
    question: "Escreva uma frase em inglês sobre quarta-feira e trabalho, usando 'often'."
    answer: "On Wednesday, I often fix bugs."
