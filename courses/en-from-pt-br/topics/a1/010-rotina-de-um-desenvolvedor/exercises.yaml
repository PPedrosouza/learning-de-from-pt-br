topic: "Rotina de um desenvolvedor"
level: "A1"
exercises:
  - title: "Reconhecimento de vocabulário"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'daily stand-up' no contexto de uma equipe de software?"
        options:
          - "reunião diária curta"
          - "pausa para almoço"
          - "tempo de foco"
        answer: "reunião diária curta"
      - id: "1.2"
        question: "Qual opção significa 'revisão de código'?"
        options:
          - "focus time"
          - "code review"
          - "lunch break"
        answer: "code review"
      - id: "1.3"
        question: "Qual palavra completa a ideia de 'nunca'?"
        options:
          - "often"
          - "usually"
          - "never"
        answer: "never"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'usually': I ___ start work at nine."
        answer: "usually"
      - id: "2.2"
        question: "Complete com 'always': We ___ have a stand-up in the morning."
        answer: "always"
      - id: "2.3"
        question: "Complete com 'sometimes': She ___ fixes bugs after lunch."
        answer: "sometimes"
      - id: "2.4"
        question: "Complete com 'never': I ___ skip lunch."
        answer: "never"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Eu frequentemente reviso código."
        answer: "I often review code."
      - id: "3.2"
        question: "Traduza para o inglês: Nós geralmente almoçamos ao meio-dia."
        answer: "We usually have lunch at noon."
      - id: "3.3"
        question: "Traduza para o inglês: Ela sempre verifica as tarefas."
        answer: "She always checks the tasks."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Transforme para usar 'she': I join the daily stand-up."
        answer: "She joins the daily stand-up."
      - id: "4.2"
        question: "Coloque 'often' na posição natural: We review code on Wednesday."
        answer: "We often review code on Wednesday."
      - id: "4.3"
        question: "Transforme para usar 'he': I start work at eight."
        answer: "He starts work at eight."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês sobre sua segunda-feira usando 'usually'."
        answer: "On Monday, I usually check my tasks."
      - id: "5.2"
        question: "Escreva uma frase em inglês sobre uma pausa para almoço usando 'always' ou 'never'."
        answer: "I always have a lunch break."
