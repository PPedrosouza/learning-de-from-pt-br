topic: "Vocabulário essencial de software"
level: "A1"
exercises:
  - type: "reconhecimento"
    title: "Escolha a tradução correta"
    items:
      - question: "O que significa 'file' em contexto de software?"
        options:
          - "arquivo"
          - "fila"
          - "falha"
        answer: "arquivo"
      - question: "O que significa 'password'?"
        options:
          - "usuário"
          - "senha"
          - "pasta"
        answer: "senha"
      - question: "O que significa 'database'?"
        options:
          - "site"
          - "teste"
          - "banco de dados"
        answer: "banco de dados"
  - type: "complete"
    title: "Complete com a palavra em inglês"
    items:
      - question: "Complete: Open the _____. (arquivo)"
        answer: "file"
      - question: "Complete: Check the _____. (servidor)"
        answer: "server"
      - question: "Complete: The _____ is new. (usuário)"
        answer: "user"
      - question: "Complete: Save the _____. (código)"
        answer: "code"
  - type: "traducao"
    title: "Traduza para o inglês"
    items:
      - question: "Traduza: A pasta está vazia."
        answer: "The folder is empty."
      - question: "Traduza: O aplicativo está aberto."
        answer: "The app is open."
      - question: "Traduza: Há um erro."
        answer: "There is an error."
  - type: "transformacao"
    title: "Troque a palavra destacada"
    items:
      - question: "Troque 'file' por 'folder': Open the file."
        answer: "Open the folder."
      - question: "Troque 'app' por 'website': Test the app."
        answer: "Test the website."
      - question: "Troque 'server' por 'database': Check the server."
        answer: "Check the database."
  - type: "producao_curta"
    title: "Produza frases curtas"
    items:
      - question: "Escreva em inglês uma frase simples para pedir que alguém salve o arquivo."
        answer: "Save the file."
      - question: "Escreva em inglês uma frase simples dizendo que o login está correto."
        answer: "The login is correct."
