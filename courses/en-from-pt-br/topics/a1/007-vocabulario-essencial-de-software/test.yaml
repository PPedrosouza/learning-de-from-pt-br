topic: "Vocabulário essencial de software"
level: "A1"
questions:
  - type: "multiple_choice"
    question: "Em uma mensagem de equipe, 'The server is slow' significa:"
    options:
      - "O servidor está lento."
      - "A senha está lenta."
      - "O arquivo está vazio."
    answer: "O servidor está lento."
  - type: "multiple_choice"
    question: "Qual palavra em inglês significa 'pasta' em contexto digital?"
    options:
      - "file"
      - "folder"
      - "error"
    answer: "folder"
  - type: "multiple_choice"
    question: "Qual opção completa melhor a frase: 'The _____ is private.'"
    options:
      - "website"
      - "database"
      - "password"
    answer: "password"
  - type: "multiple_choice"
    question: "Qual frase combina melhor com a instrução 'verifique o banco de dados'?"
    options:
      - "Check the database."
      - "Open the database."
      - "Save the database."
    answer: "Check the database."
  - type: "fill_blank"
    question: "Complete em inglês: The _____ has an error. (site)"
    answer: "website"
  - type: "translation"
    question: "Traduza para o inglês: O usuário é novo."
    answer: "The user is new."
  - type: "short_answer"
    question: "Em português brasileiro, qual é o falso cognato em 'file'?"
    answer: "File significa arquivo, não fila."
  - type: "production"
    question: "Escreva uma frase curta em inglês para dizer que você testa o código."
    answer: "I test the code."
