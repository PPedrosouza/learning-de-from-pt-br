topic: "Vocabulário essencial de software"
level: "A1"
words:
  - english: "code"
    translation: "código"
    example: "The code is simple."
    example_translation: "O código é simples."
    note: "Pode ser código de programação ou um código curto usado em sistema."
  - english: "app"
    translation: "aplicativo"
    example: "The app is new."
    example_translation: "O aplicativo é novo."
    note: "Forma curta de application; muito comum no trabalho."
  - english: "website"
    translation: "site"
    example: "The website is online."
    example_translation: "O site está online."
  - english: "server"
    translation: "servidor"
    example: "The server is slow."
    example_translation: "O servidor está lento."
  - english: "database"
    translation: "banco de dados"
    example: "The database is ready."
    example_translation: "O banco de dados está pronto."
  - english: "user"
    translation: "usuário"
    example: "The user is new."
    example_translation: "O usuário é novo."
  - english: "password"
    translation: "senha"
    example: "My password is private."
    example_translation: "Minha senha é privada."
    note: "Não significa apenas palavra; em contexto de sistema, é senha."
  - english: "login"
    translation: "login; acesso"
    example: "The login is correct."
    example_translation: "O login está correto."
    note: "Como verbo, é comum usar log in: I log in."
  - english: "file"
    translation: "arquivo"
    example: "Open the file."
    example_translation: "Abra o arquivo."
    note: "Falso cognato inicial: file não é fila."
  - english: "folder"
    translation: "pasta"
    example: "The folder is empty."
    example_translation: "A pasta está vazia."
  - english: "error"
    translation: "erro"
    example: "There is an error."
    example_translation: "Há um erro."
  - english: "test"
    translation: "teste; testar"
    example: "We test the app."
    example_translation: "Nós testamos o aplicativo."
    note: "Pode funcionar como substantivo ou verbo."
  - english: "open"
    translation: "abrir; aberto"
    example: "Open the website."
    example_translation: "Abra o site."
  - english: "save"
    translation: "salvar"
    example: "Save the file."
    example_translation: "Salve o arquivo."
  - english: "check"
    translation: "verificar"
    example: "Check the server."
    example_translation: "Verifique o servidor."
