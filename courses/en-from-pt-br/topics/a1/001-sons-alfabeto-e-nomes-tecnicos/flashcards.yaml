topic: Sons, alfabeto e nomes técnicos
level: A1
cards:
  - front: "Can you spell that?"
    back: "Você pode soletrar isso?"
    example: "Can you spell that email?"
    example_translation: "Você pode soletrar esse e-mail?"
  - front: "It is spelled"
    back: "Soletra-se"
    example: "It is spelled A-N-A."
    example_translation: "Soletra-se A-N-A."
  - front: "dot"
    back: "ponto"
    example: "My email is ana dot silva at example dot com."
    example_translation: "Meu e-mail é ana.silva@example.com."
  - front: "at"
    back: "arroba"
    example: "My email is ana at example dot com."
    example_translation: "Meu e-mail é ana@example.com."
  - front: "dash"
    back: "hífen"
    example: "My username is dev dash ana."
    example_translation: "Meu nome de usuário é dev-ana."
  - front: "file name"
    back: "nome de arquivo"
    example: "The file name is app dot J-S."
    example_translation: "O nome do arquivo é app.js."
  - front: "username"
    back: "nome de usuário"
    example: "My username is br dash coder."
    example_translation: "Meu nome de usuário é br-coder."
  - front: "Can you repeat that?"
    back: "Você pode repetir isso?"
    example: "Can you repeat that, please?"
    example_translation: "Você pode repetir isso, por favor?"
