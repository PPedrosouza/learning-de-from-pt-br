topic: "Cumprimentos e apresentações"
level: "A1"
questions:
  - id: "1"
    type: "múltipla escolha"
    question: "Você entra em uma reunião às 9h. Qual frase é mais adequada?"
    options:
      - "Good morning, team."
      - "I work at morning."
      - "Nice city to meet."
    answer: "Good morning, team."
  - id: "2"
    type: "múltipla escolha"
    question: "Qual frase diz corretamente que Clara é engenheira de software?"
    options:
      - "Clara is software engineer."
      - "Clara is a software engineer."
      - "Clara from software engineer."
    answer: "Clara is a software engineer."
  - id: "3"
    type: "múltipla escolha"
    question: "Qual opção é uma resposta natural para 'Nice to meet you'?"
    options:
      - "I live in the call."
      - "Good morning Brazil."
      - "Nice to meet you too."
    answer: "Nice to meet you too."
  - id: "4"
    type: "múltipla escolha"
    question: "Como dizer que você trabalha na empresa PixelSoft?"
    options:
      - "I am at PixelSoft."
      - "I work at PixelSoft."
      - "I live PixelSoft."
    answer: "I work at PixelSoft."
  - id: "5"
    type: "complete lacuna"
    question: "Complete: My name ___ Diego."
    answer: "is"
  - id: "6"
    type: "complete lacuna"
    question: "Complete: I live ___ Florianópolis."
    answer: "in"
  - id: "7"
    type: "tradução"
    question: "Traduza: Eu sou do Brasil."
    answer: "I am from Brazil."
  - id: "8"
    type: "tradução"
    question: "Traduza: Oi, pessoal."
    answer: "Hi everyone."
  - id: "9"
    type: "correção"
    question: "Corrija a frase: I am developer at CloudNine."
    answer: "I am a developer at CloudNine."
  - id: "10"
    type: "produção curta"
    question: "Escreva uma apresentação curta com nome, cidade e função."
    answer: "Hello, my name is Nina. I live in Brasília. I am a developer."
