topic: "Cumprimentos e apresentações"
level: "A1"
words:
  - english: "hello"
    translation: "olá"
    example: "Hello, I am Bruno."
    example_translation: "Olá, eu sou Bruno."
    note: "Cumprimento neutro e seguro em contexto profissional."
  - english: "hi"
    translation: "oi"
    example: "Hi, I am Julia."
    example_translation: "Oi, eu sou Julia."
    note: "Mais informal, muito comum em chat."
  - english: "good morning"
    translation: "bom dia"
    example: "Good morning, everyone."
    example_translation: "Bom dia, pessoal."
  - english: "everyone"
    translation: "pessoal; todos"
    example: "Hello everyone."
    example_translation: "Olá, pessoal."
  - english: "my name is"
    translation: "meu nome é"
    example: "My name is Renata."
    example_translation: "Meu nome é Renata."
  - english: "I am"
    translation: "eu sou; eu estou"
    example: "I am Carlos."
    example_translation: "Eu sou Carlos."
    note: "Neste tópico, use principalmente para nome e profissão."
  - english: "software engineer"
    translation: "engenheira/engenheiro de software"
    example: "I am a software engineer."
    example_translation: "Eu sou engenheira/engenheiro de software."
  - english: "developer"
    translation: "desenvolvedora/desenvolvedor"
    example: "I am a developer."
    example_translation: "Eu sou desenvolvedora/desenvolvedor."
  - english: "from"
    translation: "de; do; da"
    example: "I am from Brazil."
    example_translation: "Eu sou do Brasil."
  - english: "Brazil"
    translation: "Brasil"
    example: "I am from Brazil."
    example_translation: "Eu sou do Brasil."
  - english: "I live in"
    translation: "eu moro em"
    example: "I live in Salvador."
    example_translation: "Eu moro em Salvador."
  - english: "city"
    translation: "cidade"
    example: "My city is Fortaleza."
    example_translation: "Minha cidade é Fortaleza."
  - english: "company"
    translation: "empresa"
    example: "My company is TechWay."
    example_translation: "Minha empresa é a TechWay."
  - english: "I work at"
    translation: "eu trabalho na/no"
    example: "I work at CloudBits."
    example_translation: "Eu trabalho na CloudBits."
  - english: "role"
    translation: "função; cargo"
    example: "My role is developer."
    example_translation: "Minha função é desenvolvedora/desenvolvedor."
  - english: "nice to meet you"
    translation: "prazer em conhecer você"
    example: "Nice to meet you, Ana."
    example_translation: "Prazer em conhecer você, Ana."
  - english: "nice to meet you too"
    translation: "prazer em conhecer você também"
    example: "Nice to meet you too."
    example_translation: "Prazer em conhecer você também."
  - english: "chat"
    translation: "chat; conversa por texto"
    example: "Hi everyone, I am new in the chat."
    example_translation: "Oi, pessoal, eu sou novo/nova no chat."
  - english: "call"
    translation: "chamada; ligação"
    example: "Good morning, I am in the call."
    example_translation: "Bom dia, estou na chamada."
  - english: "Can you hear me?"
    translation: "Você consegue me ouvir?"
    example: "Hi, can you hear me?"
    example_translation: "Oi, você consegue me ouvir?"
