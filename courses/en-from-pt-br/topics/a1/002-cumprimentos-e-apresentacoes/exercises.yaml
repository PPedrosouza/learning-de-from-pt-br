topic: "Cumprimentos e apresentações"
level: "A1"
exercises:
  - type: "múltipla escolha"
    title: "Reconheça cumprimentos e apresentações"
    instructions: "Escolha a melhor opção."
    items:
      - id: "1.1"
        question: "Qual frase é adequada para cumprimentar uma equipe em uma chamada pela manhã?"
        options:
          - "Good morning, everyone."
          - "My role is developer."
          - "I live in Manaus."
        answer: "Good morning, everyone."
      - id: "1.2"
        question: "Como dizer 'Eu sou desenvolvedor/desenvolvedora' em inglês?"
        options:
          - "I live in developer."
          - "I am a developer."
          - "I work developer."
        answer: "I am a developer."
      - id: "1.3"
        question: "Qual frase significa 'Prazer em conhecer você'?"
        options:
          - "Can you hear me?"
          - "I am from Brazil."
          - "Nice to meet you."
        answer: "Nice to meet you."
      - id: "1.4"
        question: "Qual frase é mais natural para chat informal com colegas?"
        options:
          - "My city is chat."
          - "Hi everyone."
          - "Company good morning."
        answer: "Hi everyone."
  - type: "complete lacunas"
    title: "Complete as frases"
    instructions: "Complete com a palavra ou expressão correta em inglês."
    items:
      - id: "2.1"
        question: "Hello, my name ___ Paula."
        answer: "is"
      - id: "2.2"
        question: "I am ___ software engineer."
        answer: "a"
      - id: "2.3"
        question: "I am ___ Brazil."
        answer: "from"
      - id: "2.4"
        question: "I work ___ ByteBox."
        answer: "at"
  - type: "tradução"
    title: "Traduza para o inglês"
    instructions: "Use frases simples e naturais para A1."
    items:
      - id: "3.1"
        question: "Olá, eu sou Marcos."
        answer: "Hello, I am Marcos."
      - id: "3.2"
        question: "Meu nome é Aline."
        answer: "My name is Aline."
      - id: "3.3"
        question: "Eu moro em Curitiba."
        answer: "I live in Curitiba."
      - id: "3.4"
        question: "Eu trabalho na DevHouse."
        answer: "I work at DevHouse."
  - type: "transformação"
    title: "Deixe a apresentação mais profissional"
    instructions: "Reescreva usando a estrutura indicada."
    items:
      - id: "4.1"
        question: "Troque 'I am developer' pela forma correta."
        answer: "I am a developer."
      - id: "4.2"
        question: "Troque 'I am João' por uma frase com 'My name is'."
        answer: "My name is João."
      - id: "4.3"
        question: "Troque 'I work in CodeNow' pela forma estudada com empresa."
        answer: "I work at CodeNow."
  - type: "produção curta"
    title: "Escreva uma miniapresentação"
    instructions: "Responda em inglês com suas informações ou com dados fictícios."
    items:
      - id: "5.1"
        question: "Escreva uma apresentação com nome e função."
        answer: "Hello, my name is Ana. I am a software engineer."
      - id: "5.2"
        question: "Escreva uma mensagem curta para entrar em um chat de equipe."
        answer: "Hi everyone, I am Pedro. Nice to meet you."
      - id: "5.3"
        question: "Escreva uma frase para verificar áudio em chamada."
        answer: "Hi, can you hear me?"
