topic: "Cumprimentos e apresentações"
level: "A1"
cards:
  - front: "Hello"
    back: "Olá"
    example: "Hello, I am Maria."
    example_translation: "Olá, eu sou Maria."
  - front: "Hi"
    back: "Oi"
    example: "Hi, I am João."
    example_translation: "Oi, eu sou João."
  - front: "Good morning"
    back: "Bom dia"
    example: "Good morning, everyone."
    example_translation: "Bom dia, pessoal."
  - front: "My name is"
    back: "Meu nome é"
    example: "My name is Sofia."
    example_translation: "Meu nome é Sofia."
  - front: "I am a software engineer"
    back: "Eu sou engenheira/engenheiro de software"
    example: "I am a software engineer at DataPro."
    example_translation: "Eu sou engenheira/engenheiro de software na DataPro."
  - front: "I am a developer"
    back: "Eu sou desenvolvedora/desenvolvedor"
    example: "I am a developer at AppWorks."
    example_translation: "Eu sou desenvolvedora/desenvolvedor na AppWorks."
  - front: "I am from Brazil"
    back: "Eu sou do Brasil"
    example: "I am from Brazil, and I live in Recife."
    example_translation: "Eu sou do Brasil e moro em Recife."
  - front: "I live in"
    back: "Eu moro em"
    example: "I live in Porto Alegre."
    example_translation: "Eu moro em Porto Alegre."
  - front: "I work at"
    back: "Eu trabalho na/no"
    example: "I work at SoftCloud."
    example_translation: "Eu trabalho na SoftCloud."
  - front: "Nice to meet you"
    back: "Prazer em conhecer você"
    example: "Nice to meet you, Daniel."
    example_translation: "Prazer em conhecer você, Daniel."
  - front: "Nice to meet you too"
    back: "Prazer em conhecer você também"
    example: "Nice to meet you too, Laura."
    example_translation: "Prazer em conhecer você também, Laura."
  - front: "Can you hear me?"
    back: "Você consegue me ouvir?"
    example: "Hi, can you hear me?"
    example_translation: "Oi, você consegue me ouvir?"
