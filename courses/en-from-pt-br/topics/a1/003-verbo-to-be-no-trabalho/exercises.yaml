topic: "Verbo to be no trabalho"
level: "A1"
exercises:
  - title: "Reconhecimento"
    instructions: "Escolha a forma correta do verbo to be."
    items:
      - type: "multiple_choice"
        question: "Complete: I ___ a frontend developer."
        options:
          - "am"
          - "are"
          - "is"
        answer: "am"
      - type: "multiple_choice"
        question: "Complete: You ___ on the data team."
        options:
          - "is"
          - "are"
          - "am"
        answer: "are"
      - type: "multiple_choice"
        question: "Complete: She ___ a QA engineer."
        options:
          - "am"
          - "are"
          - "is"
        answer: "is"
      - type: "multiple_choice"
        question: "Qual frase pergunta se alguém é desenvolvedor(a)?"
        options:
          - "You are a developer."
          - "Is you a developer?"
          - "Are you a developer?"
        answer: "Are you a developer?"
  - title: "Lacunas"
    instructions: "Complete com am, are ou is."
    items:
      - type: "fill_blank"
        question: "He ___ in the office today."
        answer: "is"
      - type: "fill_blank"
        question: "They ___ on the support team."
        answer: "are"
      - type: "fill_blank"
        question: "I ___ remote this week."
        answer: "am"
      - type: "fill_blank"
        question: "We ___ in a short meeting."
        answer: "are"
  - title: "Contrações"
    instructions: "Reescreva usando contração."
    items:
      - type: "transformation"
        question: "I am a software engineer."
        answer: "I'm a software engineer."
      - type: "transformation"
        question: "You are on the product team."
        answer: "You're on the product team."
      - type: "transformation"
        question: "He is a backend developer."
        answer: "He's a backend developer."
      - type: "transformation"
        question: "She is in the office."
        answer: "She's in the office."
  - title: "Tradução"
    instructions: "Traduza para o inglês."
    items:
      - type: "translation"
        question: "Eu sou desenvolvedor(a)."
        answer: "I am a developer."
      - type: "translation"
        question: "Você está no time de produto."
        answer: "You are on the product team."
      - type: "translation"
        question: "Ela é engenheira de QA."
        answer: "She is a QA engineer."
      - type: "translation"
        question: "Ele está em uma reunião."
        answer: "He is in a meeting."
  - title: "Perguntas simples"
    instructions: "Transforme a frase em pergunta."
    items:
      - type: "transformation"
        question: "You are a designer."
        answer: "Are you a designer?"
      - type: "transformation"
        question: "She is on the backend team."
        answer: "Is she on the backend team?"
      - type: "short_answer"
        question: "Responda em inglês: Are you remote today?"
        answer: "Yes, I am."
      - type: "short_answer"
        question: "Escreva uma frase em inglês dizendo seu cargo usando I am."
        answer: "I am a developer."
