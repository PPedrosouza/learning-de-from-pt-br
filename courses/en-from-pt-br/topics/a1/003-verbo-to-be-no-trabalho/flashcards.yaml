topic: "Verbo to be no trabalho"
level: "A1"
cards:
  - front: "I am"
    back: "eu sou; eu estou"
    example: "I am a developer."
    example_translation: "Eu sou desenvolvedor(a)."
  - front: "I'm"
    back: "contração de I am"
    example: "I'm remote today."
    example_translation: "Estou remoto(a) hoje."
  - front: "you are"
    back: "você é; você está"
    example: "You are on my team."
    example_translation: "Você está no meu time."
  - front: "you're"
    back: "contração de you are"
    example: "You're a designer."
    example_translation: "Você é designer."
  - front: "he is"
    back: "ele é; ele está"
    example: "He is a product manager."
    example_translation: "Ele é gerente de produto."
  - front: "she is"
    back: "ela é; ela está"
    example: "She is a QA engineer."
    example_translation: "Ela é engenheira de QA."
  - front: "Are you a developer?"
    back: "Você é desenvolvedor(a)?"
    example: "Are you a developer? Yes, I am."
    example_translation: "Você é desenvolvedor(a)? Sim, eu sou."
  - front: "Is she in the office?"
    back: "Ela está no escritório?"
    example: "Is she in the office? No, she isn't."
    example_translation: "Ela está no escritório? Não, ela não está."
  - front: "on the team"
    back: "no time; na equipe"
    example: "He's on the backend team."
    example_translation: "Ele está no time de backend."
  - front: "in a meeting"
    back: "em uma reunião"
    example: "We're in a meeting."
    example_translation: "Nós estamos em uma reunião."
