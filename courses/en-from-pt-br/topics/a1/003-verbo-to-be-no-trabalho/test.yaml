topic: "Verbo to be no trabalho"
level: "A1"
questions:
  - type: "multiple_choice"
    question: "Complete: I ___ a product analyst."
    options:
      - "am"
      - "is"
      - "are"
    answer: "am"
  - type: "multiple_choice"
    question: "Complete: He ___ on the mobile team."
    options:
      - "are"
      - "is"
      - "am"
    answer: "is"
  - type: "multiple_choice"
    question: "Qual pergunta está correta?"
    options:
      - "She is a QA engineer?"
      - "Are she a QA engineer?"
      - "Is she a QA engineer?"
    answer: "Is she a QA engineer?"
  - type: "multiple_choice"
    question: "Qual é a contração correta de You are?"
    options:
      - "You're"
      - "Your"
      - "You's"
    answer: "You're"
  - type: "fill_blank"
    question: "Complete: Maria ___ in the office."
    answer: "is"
  - type: "fill_blank"
    question: "Complete: We ___ on the platform team."
    answer: "are"
  - type: "transformation"
    question: "Reescreva usando contração: She is remote today."
    answer: "She's remote today."
  - type: "transformation"
    question: "Transforme em pergunta: He is a designer."
    answer: "Is he a designer?"
  - type: "translation"
    question: "Traduza para o inglês: Você é gerente de produto?"
    answer: "Are you a product manager?"
  - type: "translation"
    question: "Traduza para o inglês: Ela está no time de suporte."
    answer: "She is on the support team."
  - type: "short_answer"
    question: "Responda em inglês, de forma curta e negativa: Are you in a meeting?"
    answer: "No, I'm not."
  - type: "short_answer"
    question: "Escreva uma frase em inglês sobre localização no trabalho usando They are."
    answer: "They are in the office."
