topic: "Verbo to be no trabalho"
level: "A1"
words:
  - english: "I am"
    translation: "eu sou; eu estou"
    example: "I am a developer."
    example_translation: "Eu sou desenvolvedor(a)."
    note: "Forma completa; a contração é I'm."
  - english: "I'm"
    translation: "eu sou; eu estou"
    example: "I'm in the office."
    example_translation: "Eu estou no escritório."
    note: "Contração de I am."
  - english: "you are"
    translation: "você é; você está"
    example: "You are on my team."
    example_translation: "Você está no meu time."
  - english: "you're"
    translation: "você é; você está"
    example: "You're a designer."
    example_translation: "Você é designer."
    note: "Contração de you are."
  - english: "he is"
    translation: "ele é; ele está"
    example: "He is a product manager."
    example_translation: "Ele é gerente de produto."
  - english: "he's"
    translation: "ele é; ele está"
    example: "He's in a meeting."
    example_translation: "Ele está em uma reunião."
    note: "Contração de he is."
  - english: "she is"
    translation: "ela é; ela está"
    example: "She is a QA engineer."
    example_translation: "Ela é engenheira de QA."
  - english: "she's"
    translation: "ela é; ela está"
    example: "She's on the backend team."
    example_translation: "Ela está no time de backend."
    note: "Contração de she is."
  - english: "developer"
    translation: "desenvolvedor; desenvolvedora"
    example: "Are you a developer?"
    example_translation: "Você é desenvolvedor(a)?"
  - english: "QA engineer"
    translation: "engenheiro de QA; engenheira de QA"
    example: "Is she a QA engineer?"
    example_translation: "Ela é engenheira de QA?"
  - english: "team"
    translation: "time; equipe"
    example: "We are on the same team."
    example_translation: "Nós estamos no mesmo time."
  - english: "office"
    translation: "escritório"
    example: "They are in the office."
    example_translation: "Eles/elas estão no escritório."
  - english: "meeting"
    translation: "reunião"
    example: "We're in a meeting."
    example_translation: "Nós estamos em uma reunião."
  - english: "remote"
    translation: "remoto; remota"
    example: "I'm remote today."
    example_translation: "Estou remoto(a) hoje."
  - english: "Are you...?"
    translation: "Você é...?; Você está...?"
    example: "Are you on the product team?"
    example_translation: "Você está no time de produto?"
  - english: "Is she...?"
    translation: "Ela é...?; Ela está...?"
    example: "Is she in São Paulo?"
    example_translation: "Ela está em São Paulo?"
